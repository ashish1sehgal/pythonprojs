  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"41a711e3-6a2f-4b77-a652-3d5943fa8be9\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<script src=\"01a93afc-936a-4bdb-a2ce-8a88c621ae1e\"><\u002Fscript>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0;height:100%;background:#070b12;color:#cbd5e1;font-family:system-ui,-apple-system,\"Segoe UI\",sans-serif;font-size:13px;overflow:hidden}\n  ::-webkit-scrollbar{width:9px;height:9px}\n  ::-webkit-scrollbar-thumb{background:#1e293b;border-radius:6px}\n  ::-webkit-scrollbar-track{background:transparent}\n  @keyframes rdpulse{0%,100%{opacity:.35}50%{opacity:1}}\n  @keyframes rdspin{to{transform:rotate(360deg)}}\n  input[type=range]{accent-color:#2dd4bf}\n  .rd-mono{font-family:ui-monospace,\"SF Mono\",Menlo,Consolas,monospace}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n<div style=\"height:100vh;width:100vw;display:grid;grid-template-columns:248px 1fr 332px;grid-template-rows:48px 1fr 156px;grid-template-areas:'top top top' 'side canvas right' 'bottom bottom bottom';background:#070b12\">\n\n  <!-- ============ TOPBAR ============ -->\n  <div data-screen-label=\"Topbar\" style=\"grid-area:top;display:flex;align-items:center;gap:16px;padding:0 16px;background:#0a111c;border-bottom:1px solid #18263a\">\n    <div style=\"display:flex;align-items:center;gap:9px;padding-right:16px;border-right:1px solid #1b2940\">\n      <div style=\"width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,#2dd4bf,#0e7490);box-shadow:0 0 12px rgba(45,212,191,.5)\"><\u002Fdiv>\n      <span style=\"font-weight:650;letter-spacing:.2px;color:#e2e8f0\">Atlas<span style=\"color:#2dd4bf\">Rel<\u002Fspan><\u002Fspan>\n      <span class=\"rd-mono\" style=\"font-size:10px;color:#475569;padding-top:2px\">v2.4 · discovery<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:6px\">\n      <span style=\"font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:#475569;margin-right:2px\">Pipeline<\u002Fspan>\n      <sc-for list=\"{{ passes }}\" as=\"p\" hint-placeholder-count=\"6\">\n        <div title=\"{{ p.title }}\" style=\"{{ p.pillStyle }}\">\n          <span style=\"{{ p.dotStyle }}\"><\u002Fspan>{{ p.name }}\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"flex:1\"><\u002Fdiv>\n    <button onclick=\"{{ onRun }}\" style=\"{{ runBtnStyle }}\">{{ runLabel }}<\u002Fbutton>\n    <button onclick=\"{{ onToggleQueue }}\" style=\"{{ queueBtnStyle }}\">\n      Review Queue<span style=\"{{ queueCountStyle }}\">{{ reviewCount }}<\u002Fspan>\n    <\u002Fbutton>\n    <div style=\"width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#334155,#1e293b);border:1px solid #334155;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#94a3b8\">MO<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ SIDEBAR ============ -->\n  <div data-screen-label=\"Source browser\" style=\"grid-area:side;background:#0a111c;border-right:1px solid #18263a;display:flex;flex-direction:column;overflow:hidden\">\n    <div style=\"padding:12px 14px 10px;border-bottom:1px solid #14202f\">\n      <div style=\"font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#475569;margin-bottom:9px\">Show relationships<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:5px\">\n        <sc-for list=\"{{ filters }}\" as=\"f\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ f.onClick }}\" style=\"{{ f.style }}\">{{ f.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"margin-top:12px;display:flex;align-items:center;justify-content:space-between\">\n        <span style=\"font-size:11px;color:#64748b\">Min confidence<\u002Fspan>\n        <span class=\"rd-mono\" style=\"font-size:11px;color:#2dd4bf\">{{ threshold }}%<\u002Fspan>\n      <\u002Fdiv>\n      <input type=\"range\" min=\"0\" max=\"100\" value=\"{{ threshold }}\" onchange=\"{{ onThreshold }}\" style=\"width:100%;margin-top:5px\">\n      <div style=\"font-size:10px;color:#475569;line-height:1.4;margin-top:4px;display:flex;gap:5px;align-items:flex-start\">\n        <span style=\"color:#64748b;font-size:11px\">●<\u002Fspan>\n        <span>Filters inferred edges only — declared constraints stay visible at any threshold.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex:1;overflow-y:auto;padding:6px 0 14px\">\n      <sc-for list=\"{{ sources }}\" as=\"src\" hint-placeholder-count=\"3\">\n        <div style=\"padding:10px 14px 4px;display:flex;align-items:center;gap:8px\">\n          <span style=\"{{ src.badgeStyle }}\">{{ src.badgeText }}<\u002Fspan>\n          <div style=\"flex:1;min-width:0\">\n            <div class=\"rd-mono\" style=\"font-size:12px;color:#cbd5e1;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ src.name }}<\u002Fdiv>\n            <div style=\"font-size:10px;color:#475569\">{{ src.subtitle }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-for list=\"{{ src.tables }}\" as=\"t\" hint-placeholder-count=\"3\">\n          <div onclick=\"{{ t.onSelect }}\" style=\"{{ t.rowStyle }}\">\n            <div style=\"display:flex;align-items:center;gap:7px\">\n              <span style=\"{{ t.dotStyle }}\"><\u002Fspan>\n              <span class=\"rd-mono\" style=\"font-size:12px;color:#e2e8f0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ t.table }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:6px;margin-top:4px;padding-left:14px\">\n              <span class=\"rd-mono\" style=\"font-size:10px;color:#475569\">{{ t.meta }}<\u002Fspan>\n              <span style=\"flex:1\"><\u002Fspan>\n              <sc-if value=\"{{ t.hasDeclared }}\" hint-placeholder-val=\"{{ true }}\">\n                <span title=\"declared constraints\" style=\"font-size:9px;font-weight:700;letter-spacing:.3px;padding:1px 5px;border-radius:4px;background:rgba(148,163,184,.16);color:#cbd5e1;border:1px solid rgba(148,163,184,.35)\">{{ t.declaredText }}<\u002Fspan>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ t.hasInferred }}\" hint-placeholder-val=\"{{ true }}\">\n                <span title=\"inferred relationships\" style=\"font-size:9px;font-weight:700;letter-spacing:.3px;padding:1px 5px;border-radius:4px;background:rgba(45,212,191,.14);color:#5eead4;border:1px solid rgba(45,212,191,.4)\">{{ t.inferredText }}<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ CANVAS ============ -->\n  <div data-screen-label=\"Graph canvas\" style=\"grid-area:canvas;position:relative;background:radial-gradient(circle at 50% 35%,#0c1422,#070b12 70%);overflow:hidden\">\n    <div ref=\"{{ graphRef }}\" style=\"position:absolute;inset:0\"><\u002Fdiv>\n\n    <sc-if value=\"{{ tableBanner }}\" hint-placeholder-val=\"\">\n      <div style=\"position:absolute;top:14px;left:50%;transform:translateX(-50%);max-width:560px;display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:9px;background:rgba(15,28,45,.94);border:1px solid #2b4a6b;box-shadow:0 8px 28px rgba(0,0,0,.5);backdrop-filter:blur(6px);z-index:5\">\n        <span style=\"width:7px;height:7px;border-radius:50%;background:#a78bfa;box-shadow:0 0 8px #a78bfa;flex:none\"><\u002Fspan>\n        <span style=\"font-size:12px;color:#cbd5e1;line-height:1.45\">{{ tableBanner }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- legend -->\n    <div style=\"position:absolute;bottom:14px;left:14px;display:flex;flex-direction:column;gap:6px;padding:11px 13px;border-radius:9px;background:rgba(10,17,28,.88);border:1px solid #18263a;backdrop-filter:blur(4px);font-size:10.5px\">\n      <div style=\"font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:#475569;margin-bottom:2px\">Edge legend<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px\"><svg width=\"34\" height=\"6\"><line x1=\"0\" y1=\"3\" x2=\"34\" y2=\"3\" stroke=\"#94a3b8\" stroke-width=\"2.6\"><\u002Fline><\u002Fsvg><span style=\"color:#94a3b8;white-space:nowrap\">Declared constraint<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px\"><svg width=\"34\" height=\"6\"><line x1=\"0\" y1=\"3\" x2=\"34\" y2=\"3\" stroke=\"#34d399\" stroke-width=\"1.8\"><\u002Fline><\u002Fsvg><span style=\"color:#94a3b8;white-space:nowrap\">Inferred ≥80% (likely FK)<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px\"><svg width=\"34\" height=\"6\"><line x1=\"0\" y1=\"3\" x2=\"34\" y2=\"3\" stroke=\"#f59e0b\" stroke-width=\"1.8\"><\u002Fline><\u002Fsvg><span style=\"color:#94a3b8;white-space:nowrap\">Possible lookup 60–79%<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px\"><svg width=\"34\" height=\"6\"><line x1=\"0\" y1=\"3\" x2=\"34\" y2=\"3\" stroke=\"#2dd4bf\" stroke-width=\"1.8\"><\u002Fline><\u002Fsvg><span style=\"color:#94a3b8;white-space:nowrap\">Weak correlation &lt;60%<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px\"><svg width=\"34\" height=\"6\"><line x1=\"0\" y1=\"3\" x2=\"34\" y2=\"3\" stroke=\"#a78bfa\" stroke-width=\"1.8\" stroke-dasharray=\"6 4\"><\u002Fline><\u002Fsvg><span style=\"color:#94a3b8;white-space:nowrap\">Composite (multi-column)<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px\"><svg width=\"34\" height=\"6\"><line x1=\"0\" y1=\"3\" x2=\"34\" y2=\"3\" stroke=\"#475569\" stroke-width=\"1.4\" stroke-dasharray=\"2 5\"><\u002Fline><\u002Fsvg><span style=\"color:#94a3b8;white-space:nowrap\">Rejected (audit)<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position:absolute;bottom:14px;right:14px;display:flex;gap:6px\">\n      <button onclick=\"{{ onZoomIn }}\" style=\"width:30px;height:30px;border-radius:7px;background:rgba(10,17,28,.9);border:1px solid #1e2c3f;color:#94a3b8;font-size:16px;cursor:pointer\">+<\u002Fbutton>\n      <button onclick=\"{{ onZoomOut }}\" style=\"width:30px;height:30px;border-radius:7px;background:rgba(10,17,28,.9);border:1px solid #1e2c3f;color:#94a3b8;font-size:16px;cursor:pointer\">−<\u002Fbutton>\n      <button onclick=\"{{ onZoomReset }}\" style=\"height:30px;padding:0 10px;border-radius:7px;background:rgba(10,17,28,.9);border:1px solid #1e2c3f;color:#94a3b8;font-size:11px;cursor:pointer\">Fit<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ RIGHT PANEL ============ -->\n  <div data-screen-label=\"Right panel\" style=\"grid-area:right;background:#0a111c;border-left:1px solid #18263a;display:flex;flex-direction:column;overflow:hidden\">\n    <div style=\"display:flex;padding:10px 12px 0;gap:6px;border-bottom:1px solid #14202f\">\n      <button onclick=\"{{ onShowDetail }}\" style=\"{{ detailTabStyle }}\">Detail<\u002Fbutton>\n      <button onclick=\"{{ onShowQueue }}\" style=\"{{ queueTabStyle }}\">Review Queue <span style=\"font-size:10px;opacity:.7\">({{ reviewCount }})<\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- DETAIL MODE -->\n    <sc-if value=\"{{ showDetail }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"flex:1;overflow-y:auto;padding:14px\">\n\n      <sc-if value=\"{{ detail.none }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#475569;padding:30px 16px\">\n          <div style=\"width:38px;height:38px;border-radius:9px;border:1.5px dashed #2a3a52;margin-bottom:12px\"><\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#64748b\">Select an edge to inspect a relationship<\u002Fdiv>\n          <div style=\"font-size:11px;margin-top:5px;line-height:1.5\">Declared and inferred edges open structurally different panels.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- DECLARED detail -->\n      <sc-if value=\"{{ detail.isDeclared }}\" hint-placeholder-val=\"\">\n        <div>\n          <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:3px\">\n            <span style=\"font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:3px 8px;border-radius:5px;background:rgba(148,163,184,.16);color:#cbd5e1;border:1px solid rgba(148,163,184,.4)\">Declared · ground truth<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"rd-mono\" style=\"font-size:14px;color:#e2e8f0;font-weight:600;margin:8px 0 2px;line-height:1.4\">{{ detail.title }}<\u002Fdiv>\n          <div style=\"font-size:11px;color:#64748b\">{{ detail.constraintType }} constraint · {{ detail.sourceLabel }}<\u002Fdiv>\n\n          <div style=\"margin-top:14px;border:1px solid #1c2b3f;border-radius:9px;overflow:hidden\">\n            <div style=\"padding:8px 11px;background:#0e1727;font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#475569;border-bottom:1px solid #1c2b3f\">Catalog definition<\u002Fdiv>\n            <div style=\"padding:11px\">\n              <div style=\"font-size:10px;color:#475569;margin-bottom:3px\">CONSTRAINT NAME<\u002Fdiv>\n              <div class=\"rd-mono\" style=\"font-size:12.5px;color:#94a3b8;margin-bottom:10px\">{{ detail.constraintName }}<\u002Fdiv>\n              <div style=\"font-size:10px;color:#475569;margin-bottom:4px\">DDL REPRESENTATION<\u002Fdiv>\n              <div class=\"rd-mono\" style=\"font-size:11.5px;color:#cbd5e1;line-height:1.6;background:#070d16;border:1px solid #16243a;border-radius:7px;padding:9px 10px\">{{ detail.ddl }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:12px;display:flex;align-items:flex-start;gap:9px;padding:10px 11px;border-radius:9px;background:#0e1727;border:1px solid #1c2b3f\">\n            <span style=\"width:7px;height:7px;border-radius:50%;background:#64748b;margin-top:4px;flex:none\"><\u002Fspan>\n            <div>\n              <div style=\"font-size:11px;color:#94a3b8\">Harvested from <span class=\"rd-mono\" style=\"color:#cbd5e1\">{{ detail.harvestedFrom }}<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:10px;color:#475569;margin-top:2px\">Last metadata sync · {{ detail.syncTime }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ detail.corroboration }}\" hint-placeholder-val=\"\">\n            <div style=\"margin-top:12px;display:flex;align-items:flex-start;gap:9px;padding:10px 11px;border-radius:9px;background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.28)\">\n              <span style=\"color:#34d399;font-size:13px;line-height:1.2;flex:none\">✓<\u002Fspan>\n              <div style=\"font-size:11px;color:#a7f3d0;line-height:1.5\">Discovery pipeline independently corroborates this constraint at <b>{{ detail.corroboration }}<\u002Fb> data conformance. <span style=\"color:#6ee7b7;opacity:.8\">A bonus validation that the data obeys the declared rule — not a confidence score on its existence.<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"margin-top:14px;display:flex;flex-direction:column;gap:8px\">\n            <button disabled=\"true\" style=\"width:100%;padding:9px;border-radius:8px;background:#101b2c;border:1px solid #233650;color:#64748b;font-size:12px;cursor:not-allowed\">View in source catalog ↗<\u002Fbutton>\n            <div style=\"font-size:10.5px;color:#475569;line-height:1.5;text-align:center\">No confidence score, signal breakdown, or steward actions — a DBA declared this. There is nothing to adjudicate.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- INFERRED detail -->\n      <sc-if value=\"{{ detail.isInferred }}\" hint-placeholder-val=\"\">\n        <div>\n          <div style=\"display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:3px\">\n            <span style=\"{{ detail.tierBadgeStyle }}\">{{ detail.tierLabel }}<\u002Fspan>\n            <span style=\"{{ detail.lifecycleBadgeStyle }}\">{{ detail.lifecycle }}<\u002Fspan>\n            <sc-if value=\"{{ detail.composite }}\" hint-placeholder-val=\"\">\n              <span style=\"font-size:9px;font-weight:700;letter-spacing:.5px;padding:3px 7px;border-radius:5px;background:rgba(167,139,250,.14);color:#c4b5fd;border:1px solid rgba(167,139,250,.4)\">COMPOSITE KEY<\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div class=\"rd-mono\" style=\"font-size:14px;color:#e2e8f0;font-weight:600;margin:8px 0 2px;line-height:1.4\">{{ detail.title }}<\u002Fdiv>\n          <div style=\"font-size:11px;color:#64748b\">{{ detail.sourceLabel }}<\u002Fdiv>\n\n          <div style=\"display:flex;align-items:center;gap:14px;margin-top:14px\">\n            <div style=\"position:relative;width:74px;height:74px;flex:none\">\n              <div style=\"{{ detail.ringStyle }}\"><\u002Fdiv>\n              <div style=\"position:absolute;inset:9px;border-radius:50%;background:#0a111c;display:flex;flex-direction:column;align-items:center;justify-content:center\">\n                <span class=\"rd-mono\" style=\"font-size:18px;font-weight:700;color:{{ detail.tierColor }};line-height:1\">{{ detail.confidencePct }}<\u002Fspan>\n                <span style=\"font-size:8px;color:#475569;letter-spacing:.4px\">COMPOSITE<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1\">\n              <div style=\"font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#475569;margin-bottom:7px\">Signal breakdown<\u002Fdiv>\n              <sc-for list=\"{{ detail.signals }}\" as=\"s\" hint-placeholder-count=\"5\">\n                <div style=\"margin-bottom:6px\">\n                  <div style=\"display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px\"><span style=\"color:#94a3b8\">{{ s.name }}<\u002Fspan><span class=\"rd-mono\" style=\"color:#64748b\">{{ s.pct }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"height:4px;border-radius:3px;background:#16243a;overflow:hidden\"><div style=\"{{ s.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:14px\">\n            <div style=\"font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#475569;margin-bottom:7px\">Column mapping<\u002Fdiv>\n            <sc-for list=\"{{ detail.columns }}\" as=\"c\" hint-placeholder-count=\"2\">\n              <div style=\"display:flex;align-items:center;gap:8px;padding:7px 9px;border:1px solid #1c2b3f;border-radius:7px;margin-bottom:5px;background:#0c1524\">\n                <span class=\"rd-mono\" style=\"font-size:11px;color:#cbd5e1;flex:1;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ c.from }}<\u002Fspan>\n                <span style=\"color:#475569;font-size:11px\">→<\u002Fspan>\n                <span class=\"rd-mono\" style=\"font-size:11px;color:#cbd5e1;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ c.to }}<\u002Fspan>\n                <span class=\"rd-mono\" style=\"font-size:10px;color:{{ detail.tierColor }};font-weight:600;flex:none\">{{ c.score }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ detail.lineage }}\" hint-placeholder-val=\"\">\n            <div style=\"margin-top:14px\">\n              <div style=\"font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#475569;margin-bottom:6px\">Lineage evidence <span style=\"color:#3b4a5e\">· {{ detail.lineageSource }}<\u002Fspan><\u002Fdiv>\n              <div class=\"rd-mono\" style=\"font-size:10.5px;color:#7c8aa0;line-height:1.6;background:#070d16;border:1px solid #16243a;border-radius:7px;padding:9px 10px;white-space:pre-wrap\">{{ detail.lineage }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"margin-top:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px\">\n            <button onclick=\"{{ detail.onConfirm }}\" style=\"padding:9px 0;border-radius:8px;background:rgba(52,211,153,.13);border:1px solid rgba(52,211,153,.5);color:#6ee7b7;font-size:12px;font-weight:600;cursor:pointer\">Confirm<\u002Fbutton>\n            <button onclick=\"{{ detail.onDefer }}\" style=\"padding:9px 0;border-radius:8px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.4);color:#fbbf24;font-size:12px;font-weight:600;cursor:pointer\">Defer<\u002Fbutton>\n            <button onclick=\"{{ detail.onReject }}\" style=\"padding:9px 0;border-radius:8px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.42);color:#fca5a5;font-size:12px;font-weight:600;cursor:pointer\">Reject<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"font-size:10.5px;color:#475569;text-align:center;margin-top:8px;line-height:1.5\">Confirming converts a probabilistic finding into an operational fact — the edge solidifies in the graph.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- QUEUE MODE -->\n    <sc-if value=\"{{ showQueue }}\" hint-placeholder-val=\"\">\n    <div style=\"flex:1;overflow-y:auto;padding:14px\">\n      <div style=\"display:flex;align-items:flex-start;gap:8px;padding:9px 11px;border-radius:8px;background:#0e1727;border:1px solid #1c2b3f;margin-bottom:12px\">\n        <span style=\"color:#64748b;font-size:12px;line-height:1.2;flex:none\">ⓘ<\u002Fspan>\n        <span style=\"font-size:10.5px;color:#7c8aa0;line-height:1.5\">Declared constraints don't require review — only inferred relationships appear here.<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;gap:7px;margin-bottom:12px\">\n        <button onclick=\"{{ onConfirmAll }}\" style=\"flex:1;padding:8px 0;border-radius:8px;background:rgba(52,211,153,.13);border:1px solid rgba(52,211,153,.45);color:#6ee7b7;font-size:11.5px;font-weight:600;cursor:pointer\">Confirm all visible<\u002Fbutton>\n        <button onclick=\"{{ onDeferAll }}\" style=\"flex:1;padding:8px 0;border-radius:8px;background:#111d2e;border:1px solid #25364e;color:#94a3b8;font-size:11.5px;font-weight:600;cursor:pointer\">Defer all<\u002Fbutton>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ queueEmpty }}\" hint-placeholder-val=\"\">\n        <div style=\"text-align:center;color:#475569;padding:30px 10px;font-size:12px;line-height:1.6\">Queue clear.<br>Every inferred relationship has a steward verdict.<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-for list=\"{{ queue }}\" as=\"q\" hint-placeholder-count=\"4\">\n        <div onclick=\"{{ q.onSelect }}\" style=\"{{ q.cardStyle }}\">\n          <div style=\"display:flex;align-items:center;gap:6px;margin-bottom:5px\">\n            <span style=\"{{ q.tierBadgeStyle }}\">{{ q.tierLabel }}<\u002Fspan>\n            <sc-if value=\"{{ q.composite }}\" hint-placeholder-val=\"\">\n              <span style=\"font-size:8px;font-weight:700;letter-spacing:.4px;padding:2px 5px;border-radius:4px;background:rgba(167,139,250,.14);color:#c4b5fd;border:1px solid rgba(167,139,250,.4)\">COMPOSITE<\u002Fspan>\n            <\u002Fsc-if>\n            <span style=\"flex:1\"><\u002Fspan>\n            <span class=\"rd-mono\" style=\"font-size:13px;font-weight:700;color:{{ q.tierColor }}\">{{ q.pct }}<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"rd-mono\" style=\"font-size:11px;color:#cbd5e1;line-height:1.4;margin-bottom:8px\">{{ q.title }}<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px\">\n            <button onclick=\"{{ q.onConfirm }}\" style=\"padding:6px 0;border-radius:6px;background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.4);color:#6ee7b7;font-size:11px;font-weight:600;cursor:pointer\">Confirm<\u002Fbutton>\n            <button onclick=\"{{ q.onDefer }}\" style=\"padding:6px 0;border-radius:6px;background:rgba(245,158,11,.09);border:1px solid rgba(245,158,11,.35);color:#fbbf24;font-size:11px;font-weight:600;cursor:pointer\">Defer<\u002Fbutton>\n            <button onclick=\"{{ q.onReject }}\" style=\"padding:6px 0;border-radius:6px;background:rgba(248,113,113,.09);border:1px solid rgba(248,113,113,.38);color:#fca5a5;font-size:11px;font-weight:600;cursor:pointer\">Reject<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- ============ BOTTOM PANEL ============ -->\n  <div data-screen-label=\"Bottom panel\" style=\"grid-area:bottom;background:#0a111c;border-top:1px solid #18263a;display:flex;flex-direction:column;overflow:hidden\">\n    <div style=\"display:flex;align-items:center;gap:4px;padding:0 12px;height:34px;border-bottom:1px solid #14202f;flex:none\">\n      <sc-for list=\"{{ bottomTabs }}\" as=\"bt\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ bt.onClick }}\" style=\"{{ bt.style }}\">{{ bt.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n      <span style=\"flex:1\"><\u002Fspan>\n      <span class=\"rd-mono\" style=\"font-size:10px;color:#3b4a5e\">{{ bottomMeta }}<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- LOG -->\n    <sc-if value=\"{{ tabLog }}\" hint-placeholder-val=\"{{ true }}\">\n      <div ref=\"{{ logRef }}\" class=\"rd-mono\" style=\"flex:1;overflow-y:auto;padding:8px 14px;font-size:11px;line-height:1.7\">\n        <sc-for list=\"{{ log }}\" as=\"l\" hint-placeholder-count=\"6\">\n          <div style=\"display:flex;gap:10px\"><span style=\"color:#3b4a5e;flex:none\">{{ l.time }}<\u002Fspan><span style=\"color:{{ l.color }};flex:none;width:64px\">{{ l.tag }}<\u002Fspan><span style=\"color:#94a3b8\">{{ l.text }}<\u002Fspan><\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- FUNNEL -->\n    <sc-if value=\"{{ tabFunnel }}\" hint-placeholder-val=\"\">\n      <div style=\"flex:1;overflow-y:auto;padding:10px 16px;display:flex;flex-direction:column;gap:5px\">\n        <div style=\"font-size:10px;color:#475569;margin-bottom:2px\">Candidate elimination · <span style=\"color:#64748b\">14 declared pairs excluded from the pool before scoring even begins<\u002Fspan><\u002Fdiv>\n        <sc-for list=\"{{ funnel }}\" as=\"fn\" hint-placeholder-count=\"6\">\n          <div style=\"display:flex;align-items:center;gap:10px\">\n            <span style=\"font-size:10.5px;color:#94a3b8;width:180px;flex:none;text-align:right\">{{ fn.label }}<\u002Fspan>\n            <div style=\"flex:1;height:15px;border-radius:4px;background:#0c1524;overflow:hidden\"><div style=\"{{ fn.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n            <span class=\"rd-mono\" style=\"font-size:11px;color:#2dd4bf;width:64px;flex:none\">{{ fn.count }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- TIMELINE -->\n    <sc-if value=\"{{ tabTimeline }}\" hint-placeholder-val=\"\">\n      <div style=\"flex:1;overflow-y:auto;padding:8px 16px\">\n        <sc-for list=\"{{ timeline }}\" as=\"tl\" hint-placeholder-count=\"5\">\n          <div style=\"display:flex;align-items:center;gap:11px;padding:5px 0;border-bottom:1px solid #111d2c\">\n            <span class=\"rd-mono\" style=\"font-size:10px;color:#3b4a5e;width:62px;flex:none\">{{ tl.time }}<\u002Fspan>\n            <span style=\"{{ tl.tagStyle }}\">{{ tl.action }}<\u002Fspan>\n            <span style=\"font-size:11px;color:#94a3b8;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ tl.target }}<\u002Fspan>\n            <span style=\"font-size:10.5px;color:#475569;flex:none\">{{ tl.actor }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.buildModel();\n    this.state = {\n      selectedEdgeId: null,\n      selectedNodeId: null,\n      rightMode: 'detail',\n      bottomTab: 'log',\n      filter: 'all',\n      threshold: 50,\n      running: false,\n      verdicts: {},            // edgeId -> 'confirm'|'reject'|'defer'\n      passes: this.basePasses(),\n      log: this.baseLog(),\n      timeline: this.baseTimeline()\n    };\n    this.zoomK = 1;\n  }\n\n  /* ---------------- MOCK MODEL ---------------- */\n  buildModel() {\n    this.nodes = [\n      // Oracle (catalog)\n      { id:'ora.customers',   table:'CUSTOMERS',   src:'oracle', schema:'ERP', rows:'2.1M',  cols:18 },\n      { id:'ora.orders',      table:'ORDERS',      src:'oracle', schema:'ERP', rows:'14.7M', cols:22 },\n      { id:'ora.order_lines', table:'ORDER_LINES', src:'oracle', schema:'ERP', rows:'58.3M', cols:15 },\n      { id:'ora.products',    table:'PRODUCTS',    src:'oracle', schema:'ERP', rows:'84K',   cols:27 },\n      // BigQuery (inference-only)\n      { id:'bq.fact_orders',  table:'fact_orders', src:'bq', schema:'mart', rows:'312M', cols:41 },\n      { id:'bq.dim_customer', table:'dim_customer',src:'bq', schema:'mart', rows:'2.0M', cols:33 },\n      { id:'bq.dim_product',  table:'dim_product', src:'bq', schema:'mart', rows:'91K',  cols:29 },\n      { id:'bq.dim_region',   table:'dim_region',  src:'bq', schema:'mart', rows:'240',  cols:8  },\n      // Postgres (mixed)\n      { id:'pg.users',    table:'users',    src:'pg', schema:'app', rows:'880K', cols:14 },\n      { id:'pg.sessions', table:'sessions', src:'pg', schema:'app', rows:'12.4M',cols:11 },\n      { id:'pg.events',   table:'events',   src:'pg', schema:'app', rows:'410M', cols:9  }\n    ];\n    this.nodeById = {}; this.nodes.forEach(n => this.nodeById[n.id] = n);\n\n    // type: 'declared' | 'inferred'\n    this.links = [\n      // ---- DECLARED ----\n      { id:'e1', source:'ora.orders', target:'ora.customers', type:'declared', constraintType:'FK',\n        constraintName:'FK_ORDERS_CUSTOMER', ddl:'ORDERS.customer_id\\n  REFERENCES CUSTOMERS.customer_id',\n        harvestedFrom:'Oracle ALL_CONSTRAINTS', syncTime:'2026-06-19 03:12 UTC', corroboration:'99.7%' },\n      { id:'e2', source:'ora.order_lines', target:'ora.orders', type:'declared', constraintType:'FK',\n        constraintName:'FK_ORDLINE_ORDER', ddl:'ORDER_LINES.order_id\\n  REFERENCES ORDERS.order_id',\n        harvestedFrom:'Oracle ALL_CONSTRAINTS', syncTime:'2026-06-19 03:12 UTC', corroboration:'99.9%' },\n      { id:'e3', source:'pg.sessions', target:'pg.users', type:'declared', constraintType:'FK',\n        constraintName:'fk_sessions_user_id', ddl:'sessions.user_id\\n  REFERENCES users.id',\n        harvestedFrom:'information_schema', syncTime:'2026-06-20 22:40 UTC', corroboration:null },\n\n      // ---- INFERRED ----\n      { id:'e4', source:'bq.fact_orders', target:'bq.dim_customer', type:'inferred', composite:false,\n        confidence:0.92, lifecycle:'CONFIRMED', clazz:'Likely FK',\n        columns:[{from:'fact_orders.customer_key',to:'dim_customer.customer_key',score:'0.97'}],\n        signals:{Jaccard:0.94,IND:0.99,'Name trigram':0.88,'LLM semantic':0.95,'Lineage prior':0.79},\n        lineage:'SELECT c.customer_key, c.segment\\nFROM fact_orders f JOIN dim_customer c\\n  ON f.customer_key = c.customer_key',\n        lineageSource:'Spark History · job 88f2a' },\n      { id:'e5', source:'bq.fact_orders', target:'bq.dim_product', type:'inferred', composite:false,\n        confidence:0.85, lifecycle:'CANDIDATE', clazz:'Likely FK',\n        columns:[{from:'fact_orders.product_key',to:'dim_product.product_key',score:'0.91'}],\n        signals:{Jaccard:0.87,IND:0.96,'Name trigram':0.90,'LLM semantic':0.82,'Lineage prior':0.40},\n        lineage:'SELECT p.product_key, p.category\\nFROM fact_orders f JOIN dim_product p\\n  ON f.product_key = p.product_key',\n        lineageSource:'Atlas lineage · proc etl_facts' },\n      { id:'e6', source:'bq.fact_orders', target:'bq.dim_region', type:'inferred', composite:false,\n        confidence:0.64, lifecycle:'CANDIDATE', clazz:'Possible lookup',\n        columns:[{from:'fact_orders.region_code',to:'dim_region.region_code',score:'0.71'}],\n        signals:{Jaccard:0.62,IND:0.88,'Name trigram':0.74,'LLM semantic':0.55,'Lineage prior':0.10},\n        lineage:null, lineageSource:null },\n      { id:'e7', source:'bq.dim_customer', target:'bq.dim_region', type:'inferred', composite:false,\n        confidence:0.57, lifecycle:'CANDIDATE', clazz:'Possible lookup',\n        columns:[{from:'dim_customer.region_code',to:'dim_region.region_code',score:'0.66'}],\n        signals:{Jaccard:0.58,IND:0.81,'Name trigram':0.72,'LLM semantic':0.49,'Lineage prior':0.08},\n        lineage:null, lineageSource:null },\n      // cross-system UNDECLARED COMPOSITE — the high-value finding\n      { id:'e8', source:'ora.order_lines', target:'bq.fact_orders', type:'inferred', composite:true,\n        confidence:0.78, lifecycle:'CANDIDATE', clazz:'Likely FK',\n        columns:[\n          {from:'ORDER_LINES.order_id',to:'fact_orders.order_id',score:'0.93'},\n          {from:'ORDER_LINES.fiscal_year',to:'fact_orders.fiscal_year',score:'0.81'}],\n        signals:{Jaccard:0.80,IND:0.91,'Name trigram':0.69,'LLM semantic':0.83,'Lineage prior':0.62},\n        lineage:'-- ETL load_facts.hql\\nINSERT INTO fact_orders\\nSELECT ... FROM order_lines ol\\n  -- no FK declared on (order_id, fiscal_year)',\n        lineageSource:'HiveServer2 query log' },\n      { id:'e9', source:'pg.events', target:'pg.sessions', type:'inferred', composite:false,\n        confidence:0.71, lifecycle:'CANDIDATE', clazz:'Possible lookup',\n        columns:[{from:'events.session_id',to:'sessions.id',score:'0.79'}],\n        signals:{Jaccard:0.73,IND:0.90,'Name trigram':0.85,'LLM semantic':0.60,'Lineage prior':0.22},\n        lineage:null, lineageSource:null },\n      // pre-REJECTED weak composite\n      { id:'e10', source:'pg.events', target:'pg.users', type:'inferred', composite:true,\n        confidence:0.41, lifecycle:'REJECTED', clazz:'Weak correlation',\n        columns:[\n          {from:'events.user_id',to:'users.id',score:'0.68'},\n          {from:'events.event_day',to:'users.signup_day',score:'0.19'}],\n        signals:{Jaccard:0.30,IND:0.52,'Name trigram':0.44,'LLM semantic':0.28,'Lineage prior':0.05},\n        lineage:null, lineageSource:null },\n      { id:'e11', source:'bq.dim_product', target:'bq.dim_region', type:'inferred', composite:false,\n        confidence:0.34, lifecycle:'CANDIDATE', clazz:'Weak correlation',\n        columns:[{from:'dim_product.region_hint',to:'dim_region.region_code',score:'0.38'}],\n        signals:{Jaccard:0.31,IND:0.40,'Name trigram':0.52,'LLM semantic':0.30,'Lineage prior':0.04},\n        lineage:null, lineageSource:null }\n    ];\n    this.linkById = {}; this.links.forEach(l => this.linkById[l.id] = l);\n\n    this.sourcesMeta = {\n      oracle: { name:'ORACLE_ERP_PROD',        subtitle:'Oracle 19c · schema ERP',          catalog:true,  badge:'ORA' },\n      bq:     { name:'BQ_ANALYTICS_WAREHOUSE',  subtitle:'BigQuery · dataset mart · no constraints', catalog:false, badge:'BQ' },\n      pg:     { name:'POSTGRES_APP_DB',         subtitle:'Postgres 16 · schema app',         catalog:true,  badge:'PG' }\n    };\n\n    this.funnelData = [\n      { label:'Raw column pairs',            count:'3.2B',   w:100 },\n      { label:'After LSH banding (MinHash)', count:'41,920', w:64 },\n      { label:'After Bloom / IND probing',   count:'1,847',  w:44 },\n      { label:'After trigram name affinity', count:'612',    w:30 },\n      { label:'After LLM semantic scoring',  count:'88',     w:18 },\n      { label:'After lineage corroboration', count:'9',      w:9 }\n    ];\n  }\n\n  basePasses() {\n    return [\n      { name:'Pre', title:'Pre-Pass geStyle(l) {\n    if (l.type === 'declared') return { color:'#94a3b8', width:2.6, dash:null, opacity:1 };\n    const life = this.effLifecycle(l);\n    if (life === 'REJECTED') return { color:'#475569', width:1.4, dash:'2 5', opacity:.5 };\n    if (life === 'CONFIRMED') return { color:'#34d399', width:2.6, dash:null, opacity:1 };\n    const col = this.tierColor(l.confidence);\n    return { color:col, width:1.8, dash: l.composite ? '6 4' : null, opacity:.92 };\n  }\n\n  edgeVisible(l) {\n    const f = this.state.filter;\n    if (f === 'declared' && l.type !== 'declared') return false;\n    if (f === 'inferred' && l.type !== 'inferred') return false;\n    if (f === 'composite' && !(l.type === 'inferred' && l.composite)) return false;\n    if (l.type === 'inferred') {\n      const life = this.effLifecycle(l);\n      if (life !== 'REJECTED' && (l.confidence * 100) < this.state.threshold) return false;\n    }\n    return true;\n  }\n\n  reviewCandidates() {\n    return this.links.filter(l => l.type === 'inferred' && this.effLifecycle(l) === 'CANDIDATE');\n  }\n\n  /* ---------------- ACTIONS ---------------- */\n  selectEdge(id) { this.setState({ selectedEdgeId:id, selectedNodeId:null, rightMode:'detail' }); }\n  selectNode(id) { this.setState({ selectedNodeId:id, selectedEdgeId:null }); }\n\n  verdict(id, v) {\n    const l = this.linkById[id];\n    this.setState(s => ({ verdicts: { ...s.verdicts, [id]: v } }));\n    const label = v === 'confirm' ? 'CONFIRMED' : v === 'reject' ? 'REJECTED' : 'DEFERRED';\n    const kind  = v === 'confirm' ? 'confirm' : v === 'reject' ? 'reject' : 'sync';\n    const tgt = this.nodeById[this._idOf(l.source)].table + (l.composite ? ' ⊕ ' : ' → ') + this.nodeById[this._idOf(l.target)].table + ' (' + Math.round(l.confidence*100) + '%)';\n    const now = new Date(); const hh = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');\n    this.setState(s => ({ timeline: [{ time:hh, action:label, kind, target:tgt, actor:'M. Okafor (you)' }, ...s.timeline] }));\n  }\n\n  confirmAllVisible() {\n    const upd = {}; this.reviewCandidates().filter(l => this.edgeVisible(l)).forEach(l => upd[l.id] = 'confirm');\n    this.setState(s => ({ verdicts: { ...s.verdicts, ...upd } }));\n  }\n  deferAllVisible() {\n    const upd = {}; this.reviewCandidates().filter(l => this.edgeVisible(l)).forEach(l => upd[l.id] = 'defer');\n    this.setState(s => ({ verdicts: { ...s.verdicts, ...upd } }));\n  }\n\n  setFilter(f) { this.setState({ filter:f }); }\n  setThreshold(e) { this.setState({ threshold: +e.target.value }); }\n  setBottomTab(t) { this.setState({ bottomTab:t }); }\n\n  runPipeline() {\n    if (this.state.running) return;\n    const steps = [\n      { i:0, tag:'PRE-PASS', color:'#94a3b8', text:'Harvesting catalog constraints — Oracle ALL_CONSTRAINTS, information_schema…' },\n      { i:0, tag:'PRE-PASS', color:'#94a3b8', text:'Excluding 14 column-pairs with existing FK constraints from candidate pool' },\n      { i:1, tag:'PASS 1',   color:'#2dd4bf', text:'MinHash/LSH banding · 3.2B candidate pairs → 41,920 survivors' },\n      { i:2, tag:'PASS 2',   color:'#2dd4bf', text:'Bloom filter IND probing · 41,920 → 1,847 inclusion candidates' },\n      { i:3, tag:'PASS 3',   color:'#f59e0b', text:'Trigram name affinity scoring · 1,847 → 612 ranked' },\n      { i:4, tag:'PASS 4',   color:'#a78bfa', text:'LLM semantic adjudication on top 612 → 88 scored' },\n      { i:5, tag:'PASS 5',   color:'#34d399', text:'Lineage mining (Atlas / Spark History) corroborated 23 → 9 surfaced' }\n    ];\n    const passes = this.basePasses().map(p => ({ ...p, state:'idle' }));\n    this.setState({ running:true, passes, log:[], bottomTab:'log' });\n    let k = 0;\n    const tick = () => {\n      if (k >= steps.length) {\n        this.setState(s => ({ running:false, passes: s.passes.map(p => ({ ...p, state:'done' })) }));\n        return;\n      }\n      const st = steps[k];\n      this.setState(s => {\n        const np = s.passes.map((p, idx) => ({ ...p, state: idx < st.i ? 'done' : idx === st.i ? 'running' : 'idle' }));\n        const now = new Date(); const t = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');\n        return { passes:np, log:[...s.log, { time:t, tag:st.tag, color:st.color, text:st.text }] };\n      });\n      k++;\n      setTimeout(tick, 850);\n    };\n    tick();\n  }\n\n  /* ---------------- D3 GRAPH ---------------- */\n  componentDidMount() {\n    this._waitD3 = setInterval(() => {\n      if (window.d3 && this.graphHost) { clearInterval(this._waitD3); this.initGraph(); }\n    }, 60);\n    this._onResize = () => this.resizeGraph();\n    window.addEventListener('resize', this._onResize);\n  }\n  componentWillUnmount() {\n    clearInterval(this._waitD3);\n    window.removeEventListener('resize', this._onResize);\n    if (this.sim) this.sim.stop();\n  }\n  componentDidUpdate() { this.refreshGraph(); this.autoscrollLog(); }\n\n  autoscrollLog() {\n    if (this.logHost && this.state.bottomTab === 'log') this.logHost.scrollTop = this.logHost.scrollHeight;\n  }\n\n  initGraph() {\n    const d3 = window.d3;\n    const host = this.graphHost;\n    const W = host.clientWidth, H = host.clientHeight;\n    const svg = d3.select(host).append('svg').attr('width', W).attr('height', H).style('display','block');\n    this.svg = svg;\n\n    const defs = svg.append('defs');\n    const mk = defs.append('marker').attr('id','rd-arrow').attr('viewBox','0 -5 10 10')\n      .attr('refX', 26).attr('refY',0).attr('markerWidth',5).attr('markerHeight',5).attr('orient','auto');\n    mk.append('path').attr('d','M0,-4L8,0L0,4').attr('fill','context-stroke');\n\n    const root = svg.append('g'); this.root = root;\n    this.zoom = d3.zoom().scaleExtent([0.35, 2.6]).on('zoom', (ev) => { root.attr('transform', ev.transform); this.zoomK = ev.transform.k; });\n    svg.call(this.zoom).on('dblclick.zoom', null);\n    svg.on('click', (ev) => { if (ev.target === svg.node()) this.setState({ selectedEdgeId:null, selectedNodeId:null }); });\n\n    const linkLayer = root.append('g'); this.linkLayer = linkLayer;\n    const decorLayer = root.append('g'); this.decorLayer = decorLayer;\n    const nodeLayer = root.append('g'); this.nodeLayer = nodeLayer;\n\n    // links\n    this.linkSel = linkLayer.selectAll('line').data(this.links, d => d.id).join('line')\n      .attr('stroke-linecap','round').attr('marker-end','url(#rd-arrow)')\n      .style('cursor','pointer')\n      .on('click', (ev,d) => { ev.stopPropagation(); this.selectEdge(d.id); });\n\n    // wide invisible hit areas\n    this.hitSel = linkLayer.selectAll('line.hit').data(this.links, d => d.id).enter().append('line')\n      .attr('class','hit').attr('stroke','transparent').attr('stroke-width',14).style('cursor','pointer')\n      .on('click', (ev,d) => { ev.stopPropagation(); this.selectEdge(d.id); });\n\n    // decorations (midpoint pill)\n    this.decorSel = decorLayer.selectAll('g').data(this.links, d => d.id).join('g').style('cursor','pointer')\n      .on('click', (ev,d) => { ev.stopPropagation(); this.selectEdge(d.id); });\n    this.decorSel.append('rect').attr('rx',4).attr('height',15);\n    this.decorSel.append('text').attr('text-anchor','middle').attr('dy','0.32em')\n      .attr('font-family','ui-monospace,Menlo,monospace').attr('font-size',9).attr('font-weight',700);\n\n    // nodes\n    const node = nodeLayer.selectAll('g').data(this.nodes, d => d.id).join('g').style('cursor','grab');\n    this.nodeSel = node;\n    node.append('rect').attr('class','nbg').attr('width',150).attr('height',46).attr('x',-75).attr('y',-23).attr('rx',9);\n    node.append('circle').attr('class','sdot').attr('cx',-63).attr('cy',-9).attr('r',3.5);\n    node.append('text').attr('class','ntab').attr('x',-52).attr('y',-5)\n      .attr('font-family','ui-monospace,Menlo,monospace').attr('font-size',11.5).attr('font-weight',600).attr('fill','#e2e8f0'); lectedEdgeId;\n    const selNode = this.state.selectedNodeId;\n    const endpts = new Set();\n    if (selEdge) { const l = this.linkById[selEdge]; endpts.add(this._idOf(l.source)); endpts.add(this._idOf(l.target)); }\n\n    this.linkSel.each((d, i, arr) => {\n      const el = window.d3.select(arr[i]);\n      const vis = this.edgeVisible(d);\n      const st = this.edgeStyle(d);\n      const isSel = d.id === selEdge;\n      el.attr('display', vis ? null : 'none')\n        .attr('stroke', st.color)\n        .attr('stroke-width', isSel ? st.width + 1.6 : st.width)\n        .attr('stroke-dasharray', st.dash || null)\n        .attr('opacity', isSel ? 1 : (selEdge ? st.opacity * 0.42 : st.opacity))\n        .style('filter', isSel ? 'drop-shadow(0 0 5px '+st.color+')' : null);\n    });\n    this.hitSel.attr('display', d => this.edgeVisible(d) ? null : 'none');\n\n    this.decorSel.attr('display', d => this.edgeVisible(d) ? null : 'none').attr('opacity', d => selEdge && d.id !== selEdge ? 0.4 : 1);\n    this.decorSel.select('text').text(d => this._decorText(d)).attr('fill', d => this._decorTextColor(d));\n    this.decorSel.select('rect').each((d,i,arr)=>{\n      const txt = this._decorText(d); const w = Math.max(16, txt.length*6.6 + 8);\n      window.d3.select(arr[i]).attr('width', w).attr('x', -w/2).attr('y',-7.5)\n        .attr('fill', this._decorBg(d)).attr('stroke', this._decorTextColor(d)).attr('stroke-opacity',0.5).attr('stroke-width',1);\n    });\n\n    this.nodeSel.select('rect.nbg')\n      .attr('fill', d => (selNode===d.id) ? '#13243a' : '#0d1726')\n      .attr('stroke', d => selNode===d.id ? '#2dd4bf' : (endpts.has(d.id) ? '#2dd4bf' : (this.sourcesMeta[d.src].catalog ? '#26384f' : '#2a3550')))\n      .attr('stroke-width', d => (selNode===d.id || endpts.has(d.id)) ? 2 : 1)\n      .style('filter', d => (selNode===d.id || endpts.has(d.id)) ? 'drop-shadow(0 0 7px rgba(45,212,191,.4))' : null);\n    this.nodeSel.select('circle.sdot').attr('fill', d => this._srcColor(d. s.zoomK = t.k;\n  }\n  zoomBy(f){\n    if(!this.svg) return;\n    const d3=window.d3; const cur=this.svg.node().__zoom || d3.zoomIdentity;\n    const W=this.graphHost.clientWidth, H=this.graphHost.clientHeight;\n    const k=Math.max(0.35, Math.min(2.6, cur.k*f));\n    const cx=W/2, cy=H/2;\n    const tx=cx-(cx-cur.x)*(k/cur.k), ty=cy-(cy-cur.y)*(k/cur.k);\n    this._applyTransform(d3.zoomIdentity.translate(tx,ty).scale(k), true);\n  }\n\n  /* ---------------- RENDER VALS ---------------- */\n  renderVals() {\n    const S = this.state;\n\n    const passes = S.passes.map(p => {\n      const c = p.state==='done' ? '#34d399' : p.state==='running' ? '#f59e0b' : '#3b4a5e';\n      const bg = p.state==='running' ? 'rgba(245,158,11,.12)' : p.state==='done' ? 'rgba(52,211,153,.08)' : '#0e1727';\n      const bd = p.state==='running' ? 'rgba(245,158,11,.5)' : p.state==='done' ? 'rgba(52,211,153,.3)' : '#1c2b3f';\n      return { name:p.name, title:p.title,\n        pillStyle:`display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;background:${bg};border:1px solid ${bd};color:${c==='#3b4a5e'?'#64748b':c}`,\n        dotStyle:`width:6px;height:6px;border-radius:50%;background:${c};${p.state==='running'?'animation:rdpulse 1s infinite':''}` };\n    });\n\n    const filterDefs = [\n      { key:'all',       label:'All' },\n      { key:'declared',  label:'Declared' },\n      { key:'inferred',  label:'Inferred' },\n      { key:'composite', label:'Undeclared composite' }\n    ];\n    const filters = filterDefs.map(f => {\n      const active = S.filter===f.key;\n      return { label:f.label, onClick:()=>this.setFilter(f.key),\n        style:`padding:6px 4px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid ${active?'#2dd4bf':'#1e2c3f'};background:${active?'rgba(45,212,191,.14)':'#0e1727'};color:${active?'#5eead4':'#94a3b8'}` };\n    });\n\n    // sidebar sources\n    const declCount = id => this.links.filter(l=>l.type==='declared' && (this._idOf(l.source)===id||this._idOf(l.target)===id)).length;\n    const infCount  = id => this.links.filter(l=>l.type==='inferred' && this.effLifecycle(l)!=='REJECTED' && (this._idOf(l.source)===id||this._idOf(l.target)===id)).length;\n    const order = ['oracle','bq','pg'];\n    const sources = order.map(sk => {\n      const m = this.sourcesMeta[sk];\n      const tables = this.nodes.filter(n=>n.src===sk).map(n=>{\n        const dc=declCount(n.id), ic=infCount(n.id);\n        const sel = S.selectedNodeId===n.id;\n        return { table:n.table, meta:n.rows+' · '+n.cols+'c', onSelect:()=>this.selectNode(n.id),\n          hasDeclared:dc>0, declaredText:dc+' declared', hasInferred:ic>0, inferredText:ic+' inferred',\n          dotStyle:`width:6px;height:6px;border-radius:50%;background:${this._srcColor(sk)};flex:none`,\n          rowStyle:`padding:7px 14px 8px 16px;cursor:pointer;border-left:2px solid ${sel?'#2dd4bf':'transparent'};background:${sel?'rgba(45,212,191,.07)':'transparent'}` };\n      });\n      return { name:m.name, subtitle:m.subtitle, tables, badgeText:m.badge,\n        badgeStyle:`font-size:9px;font-weight:700;padding:3px 6px;border-radius:5px;letter-spacing:.5px;flex:none;color:${m.catalog?'#cbd5e1':'#93c5fd'};background:${m.catalog?'rgba(148,163,184,.14)':'rgba(96,165,250,.12)'};border:1px solid ${m.catalog?'rgba(148,163,184,.35)':'rgba(96,165,250,.35)'}` };\n    });\n\n    // partially-declared banner\n    let tableBanner = '';\n    if (S.selectedNodeId) {\n      const dc=declCount(S.selectedNodeId), ic=infCount(S.selectedNodeId);\n      const n=this.nodeById[S.selectedNodeId];\n      if (dc>0 && ic>0) tableBanner = `${n.table} has ${dc} declared constraint${dc>1?'s':''} and ${ic} additional inferred relationship${ic>1?'s':''} beyond its declared schema — these columns are undocumented in the catalog.`;\n    }\n\n    // queue\n    const cands = this.reviewCandidates();\n    const queue = cands.map(l => {\n      const col=this.tierColor(l.confidence), sel=S.selectedEdgeId===l.id;\n      return { title:this.nodeById[this._idOf(l.source)].table+(l.composite?' ⊕ ':' → ')+this.nodeById[this._idOf(l.target)].table,\n        pct:Math.round(l.confidence*100)+'%', tierLabel:l.clazz, tierColor:col, composite:l.composite,\n        onSelect:()=>this.selectEdge(l.id), onConfirm:()=>this.verdict(l.id,'confirm'),\n        onDefer:()=>this.verdict(l.id,'defer'), onReject:()=>this.verdict(l.id,'reject'),\n        tierBadgeStyle:`font-size:8px;font-weight:700;letter-spacing:.4px;padding:2px 6px;border-radius:4px;color:${col};background:${col}22;border:1px solid ${col}66`,\n        cardStyle:`padding:10px 11px;border-radius:9px;margin-bottom:8px;cursor:pointer;background:${sel?'#13243a':'#0c1524'};border:1px solid ${sel?'#2dd4bf':'#1c2b3f'}` };\n    });\n\n    // detail\n    const detail = this.buildDetail();\n\n    // bottom\n    const bottomTabs = [['log','Execution Log'],['funnel','Candidate Funnel'],['timeline','Lifecycle Timeline']].map(([k,lbl])=>{\n      const a=S.bottomTab===k;\n      return { label:lbl, onClick:()=>this.setBottomTab(k),\n        style:`padding:5px 11px;border-radius:6px;font-size:11.5px;font-weight:600;cursor:pointer;border:none;background:${a?'#13243a':'transparent'};color:${a?'#e2e8f0':'#64748b'}` };\n    });\n    const funnel = this.funnelData.map(f=>({ label:f.label, count:f.count,\n      barStyle:`height:100%;width:${f.w}%;border-radius:4px;background:linear-gradient(90deg,#0e7490,#2dd4bf);min-width:18px` }));\n    const timeline = S.timeline.map(t=>{\n      const c = t.kind==='confirm'?'#34d399':t.kind==='reject'?'#f87171':t.kind==='run'?'#2dd4bf':'#94a3b8';\n      return { ...t, tagStyle:`font-size:9px;font-weight:700;letter-spacing:.4px;padding:2px 7px;border-radius:4px;width:74px;text-align:center;flex:none;color:${c};background:${c}1e;border:1px solid ${c}55` };\n    });\n\n    const reviewCount = cands.length;\n\n    return {\n      passes, filters, sources, tableBanner,\n      threshold:S.threshold, onThreshold:(e)=>this.setThreshold(e),\n      onRun:()=>this.runPipeline(), runLabel:S.running?'Running…':'Run Discovery',\n      runBtnStyle:`display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:7px;font-size:12px;font-weight:600;cursor:${S.running?'default':'pointer'};border:1px solid ${S.running?'rgba(245,158,11,.5)':'#2dd4bf'};background:${S.running?'rgba(245,158,11,.12)':'rgba(45,212,191,.16)'};color:${S.running?'#fbbf24':'#5eead4'}`,\n      onToggleQueue:()=>this.setState({rightMode:'queue'}),\n      queueBtnStyle:`display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #25364e;background:#0e1727;color:#cbd5e1`,\n      queueCountStyle:`font-size:10px;font-weight:700;padding:1px 6px;border-radius:9px;background:rgba(45,212,191,.18);color:#5eead4`,\n      reviewCount,\n      onShowDetail:()=>this.setState({rightMode:'detail'}),\n      onShowQueue:()=>this.setState({rightMode:'queue'}),\n      showDetail:S.rightMode==='detail', showQueue:S.rightMode==='queue',\n      detailTabStyle:this._tabStyle(S.rightMode==='detail'),\n      queueTabStyle:this._tabStyle(S.rightMode==='queue'),\n      detail, queue, queueEmpty:queue.length===0,\n      onConfirmAll:()=>this.confirmAllVisible(), onDeferAll:()=>this.deferAllVisible(),\n      bottomTabs, tabLog:S.bottomTab==='log', tabFunnel:S.bottomTab==='funnel', tabTimeline:S.bottomTab==='timeline',\n      log:S.log, funnel, timeline,\n      bottomMeta: S.bottomTab==='log' ? 'run #4820 · '+S.log.length+' lines' : S.bottomTab==='funnel' ? '3.2B → 9' : S.timeline.length+' events',\n      onZoomIn:()=>this.zoomBy(1.3), onZoomOut:()=>this.zoomBy(1/1.3), onZoomReset:()=>this.fit(),\n      graphRef:(el)=>{ this.graphHost=el; }, logRef:(el)=>{ this.logHost=el; }\n    };\n  }\n\n  _tabStyle(active){ return `padding:8px 12px;border:none;background:none;cursor:pointer;font-size:12.5px;font-weight:600;color:${active?'#e2e8f0':'#64748b'};border-bottom:2px solid ${active?'#2dd4bf':'transparent'}`; }\n\n  buildDetail(){\n    const id = this.state.selectedEdgeId;\n    if (!id) return { none:true, isDeclared:false, isInferred:false, signals:[], columns:[] };\n    const l = this.linkById[id];\n    const sNode = this.nodeById[this._idOf(l.source)], tNode = this.nodeById[this._idOf(l.target)];\n    const title = sNode.table + (l.composite?' ⊕ ':' → ') + tNode.table;\n    const sm = this.sourcesMeta[sNode.src];\n    const tm = this.sourcesMeta[tNode.src];\n    const crossSrc = sNode.src !== tNode.src;\n    const sourceLabel = crossSrc ? (sm.name+' → '+tm.name) : sm.name;\n\n    if (l.type==='declared') {\n      return { none:false, isDeclared:true, isInferred:false, title, sourceLabel,\n        constraintType:l.constraintType, constraintName:l.constraintName, ddl:l.ddl,\n        harvestedFrom:l.harvestedFrom, syncTime:l.syncTime, corroboration:l.corroboration,\n        signals:[], columns:[] };\n    }\n    const life = this.effLifecycle(l);\n    const col = life==='CONFIRMED' ? '#34d399' : this.tierColor(l.confidence);\n    const pct = Math.round(l.confidence*100);\n    const signals = Object.entries(l.signals).map(([name,v])=>({ name, pct:Math.round(v*100)+'%',\n      barStyle:`height:100%;width:${Math.round(v*100)}%;background:${col};border-radius:3px` }));\n    const columns = l.columns.map(c=>({ from:c.from, to:c.to, score:c.score }));\n    const lifeColors = { CONFIRMED:'#34d399', REJECTED:'#f87171', MONITORING:'#fbbf24', CANDIDATE:'#94a3b8' };\n    const lc = lifeColors[life];\n    return { none:false, isDeclared:false, isInferred:true, title, sourceLabel, composite:l.composite,\n      confidencePct:pct+'%', tierColor:col, tierLabel:l.clazz, lifecycle:life,\n      ringStyle:`position:absolute;inset:0;border-radius:50%;background:conic-gradient(${col} ${pct*3.6}deg, #16243a 0)`,\n      tierBadgeStyle:`font-size:9px;font-weight:700;letter-spacing:.5px;padding:3px 8px;border-radius:5px;color:${col};background:${col}22;border:1px solid ${col}66`,\n      lifecycleBadgeStyle:`font-size:9px;font-weight:700;letter-spacing:.5px;padding:3px 8px;border-radius:5px;color:${lc};background:${lc}1e;border:1px solid ${lc}55`,\n      signals, columns, lineage:l.lineage, lineageSource:l.lineageSource,\n      onConfirm:()=>this.verdict(id,'confirm'), onReject:()=>this.verdict(id,'reject'), onDefer:()=>this.verdict(id,'defer') };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
